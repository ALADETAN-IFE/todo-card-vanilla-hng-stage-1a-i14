<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <main class="app_bg" aria-label="Todo card preview">
      <article class="todo-card" data-testid="test-todo-card">
        <div class="todo-card__top-row">
          <span class="todo-card__eyebrow">Today's focus</span>
          <span
            class="todo-card__priority"
            data-testid="test-todo-priority"
            aria-label="Priority: High"
          >
            High
          </span>
        </div>

        <header class="todo-card__header">
          <h2 class="todo-card__title" data-testid="test-todo-title">
            Design an Accessible Todo Task Card
          </h2>
          <p class="todo-card__description" data-testid="test-todo-description">
            A polished, testable task card with keyboard support, responsive
            layout, and clear status signals for better focus.
          </p>
        </header>

        <section class="todo-card__details" aria-label="Todo details">
          <div class="todo-card__field">
            <span class="todo-card__label">Status</span>
            <strong
              class="todo-card__status"
              data-testid="test-todo-status"
              aria-label="Status: Pending"
            >
              Pending
            </strong>
          </div>

          <div class="todo-card__field">
            <span class="todo-card__label">Due date</span>
            <time
              class="todo-card__meta-value"
              data-testid="test-todo-due-date"
              datetime="2026-04-16T00:00:00.000Z"
            >
              Due Apr 16, 2026 at 12:00 AM
            </time>
          </div>

          <div class="todo-card__field">
            <span class="todo-card__label">Time remaining</span>
            <time
              class="todo-card__time-remaining"
              data-testid="test-todo-time-remaining"
              datetime="2026-04-16T00:00:00.000Z"
              aria-live="polite"
            >
              Due in 12 hours
            </time>
          </div>
        </section>

        <label class="todo-card__toggle-row" for="complete-toggle">
          <input
            id="complete-toggle"
            class="todo-card__checkbox"
            data-testid="test-todo-complete-toggle"
            type="checkbox"
            aria-label="Mark task as complete"
          />
          <span class="todo-card__toggle-copy">
            <span class="todo-card__toggle-title">Completion toggle</span>
            <span class="todo-card__toggle-description" data-todo-toggle-copy>
              This task is not complete.
            </span>
          </span>
        </label>

        <section class="todo-card__tags" aria-labelledby="tags-heading">
          <h3 id="tags-heading" class="todo-card__label">Tags</h3>
          <ul class="todo-card__tag-list" data-testid="test-todo-tags" role="list">
            <li class="todo-card__tag" data-testid="test-todo-tag-work">Work</li>
            <li class="todo-card__tag" data-testid="test-todo-tag-urgent">Urgent</li>
            <li class="todo-card__tag" data-testid="test-todo-tag-design">Design</li>
          </ul>
        </section>

        <div class="todo-card__actions">
          <button
            type="button"
            class="todo-card__button todo-card__button--primary"
            data-testid="test-todo-edit-button"
          >
            Edit
          </button>
          <button
            type="button"
            class="todo-card__button todo-card__button--danger"
            data-testid="test-todo-delete-button"
          >
            Delete
          </button>
        </div>
      </article>
    </main>
  </body>
</html>
